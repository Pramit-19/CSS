<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-Decoration</title>
    <style>
        #dec{
            background-color: yellowgreen;
            /* text-decoration: dashed; */
            /* text-decoration: dotted; */
            /* text-decoration: double; */
            /* text-decoration: line-through; */
            /* text-decoration: overline; */
            text-decoration: underline;
            /* text-decoration: wavy; */
        }
        #link{
            text-decoration: none;
            
        }
        .box{text-decoration: underline;}
        #box1{text-decoration-style:dashed;}
        #box2{text-decoration-style:dotted;}
        #box3{text-decoration-style:double;}
        #box4{text-decoration-style:wavy;
            text-decoration-color: rgb(113, 28, 42);
        }

        
    </style>
</head>
<body>
    <h1 id="dec">Text-Decoration</h1>
    <a href="#" id="link">Click Here</a>

    <h2 class="box" id="box1">Box1</h2>
    <h2 class="box" id="box2">Box2</h2>
    <h2 class="box" id="box3">Box3</h2>
    <h2 class="box" id="box4">Box4</h2>
</body>
</html>
