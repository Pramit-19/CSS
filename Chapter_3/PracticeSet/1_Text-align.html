<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-Align</title>
    <style>
        .box{height: 200px; width: 200px;}
        #box1{background-color: red; text-align: left;}
        #box2{background-color: blue; text-align: center;}
        #box3{background-color: green; text-align: right;}
    </style>
</head>
<body>
    <h1 class="box" id="box1">First</h1>
    <h1 class="box" id="box2">Second</h1>
    <h1 class="box" id="box3">Third</h1>
</body>
</html>
