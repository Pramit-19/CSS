<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 100px;
            width: 100px;
            background-color: yellow;
            margin: 5px;
            padding: 5px;
            border: 5px dashed red;
        }
    </style>
</head>
<body>
    <div class="box" id="box1" style="box-sizing: content-box;">BOX 1 </div>  <!--content box-->
    <div class="box" id="box2" style="box-sizing: border-box;">BOX 2 </div>   <!-- border box-->
</body>
</html>
