<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin</title>
    <style>
        *{margin: 0;
        padding: 0;
    }
        #button{
            margin: 10px;
            padding: 115px;
            border: 2px dashed rgb(18, 7, 22);
            border-radius: 50%;
            background-color: rgb(245, 161, 44);
            color: rgb(14, 37, 52);
            font-size: xx-large;
            


        }
    </style>
</head>
<body>
    <button id="button">India</button>
</body>
</html>
