<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padding Property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        #padded{
            height: 50px;
            width: 50px;
            padding: 55px 55px 55px 55px ;
            /* padding : 55px; */
            background-color: slateblue;
            color: rgb(252, 252, 34);
        }
    </style>
</head>
<body>
    <div id="padded">Learn Padding  </div>
</body>
</html>
