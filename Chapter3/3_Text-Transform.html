<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-Transform</title>
    <style>
        #box1{text-transform: uppercase;}
        #box2{text-transform: lowercase;}
        #box3{text-transform: capitalize;}
        #box4{text-transform: none;}
    </style>
</head>
<body>
    <h2 class="box" id="box1">Pramit Pramanick</h2>
    <h2 class="box" id="box2">Pramit Pramanick</h2>
    <h2 class="box" id="box3">Pramit pramanick</h2>
    <h2 class="box" id="box4">PrAmit PramaNick</h2>
</body>
</html>
