<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block_Element</title>
    <style>
        *{margin: 0;padding: 0;}
        .box{
            height: 100px;
            width: 100px;
            background-color: rgb(129, 90, 255);
            margin: 5px;
            padding-inline-start: 5px;
            text-align: center;
            border: 2px solid black;
            border-radius: 20px;
            color: aliceblue;
            
            display: block;
        }
    </style>
</head>
<body>
    <div class="box" id="div1">I</div>
    <div class="box" id="div2">Love</div>
    <div class="box" id="div3">You</div>
</body>
</html>
