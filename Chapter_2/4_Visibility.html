<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visibility</title>
    <style>
        .box{
            height: 150px;
            width: 150px;
        }
        #box-1{
            background-color: skyblue;
            visibility: hidden;
        }
        #box-2{
            background-color: yellowgreen;
            visibility: visible;   /*by default visible*/
        }
    </style>
</head>
<body>
    <div id="box-1" class="box">Box1</div>
    <div id="box-2" class="box">Box2</div>
</body>
</html>
